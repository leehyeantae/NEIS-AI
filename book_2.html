<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>독서활동상황관리</title>
    <style>
      /* [기본 스타일 유지] */
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", -apple-system, sans-serif;
        background: #f5f6f8;
        color: #333;
        overflow: hidden;
      }

      .topbar {
        height: 48px;
        background: #f5c6cf;
        display: flex;
        align-items: center;
        padding: 0 16px;
        font-weight: 700;
        border-bottom: 1px solid #e5adba;
        color: #333;
      }

      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: calc(100vh - 48px);
      }
      .left {
        padding: 25px;
        border-right: 1px solid #e5e7eb;
        background: #fff;
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow-y: auto;
      }
      .right {
        padding: 25px;
        background: #fff;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }

      /* 입력 카드 */
      .input-card {
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 25px;
        background: #fff;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        border-bottom: 2px solid #f3f4f6;
        padding-bottom: 10px;
      }
      .card-title {
        font-weight: 700;
        font-size: 18px;
        color: #1f2937;
      }

      .label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .label {
        font-size: 13px;
        font-weight: 600;
        color: #4b5563;
        display: block;
      }
      .db-view-btn {
        font-size: 12px;
        color: #1f4ddc;
        cursor: pointer;
        text-decoration: underline;
        background: none;
        border: none;
        padding: 0;
      }
      .db-view-btn:hover {
        color: #163aa5;
        font-weight: bold;
      }

      .input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 14px;
        transition: 0.2s;
      }
      .input:focus {
        border-color: #1f4ddc;
        outline: none;
      }

      .btn {
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid #d1d5db;
        background: #fff;
        transition: 0.2s;
        color: #374151;
      }
      .btn:hover {
        background: #f9fafb;
      }
      .btn.primary {
        background: #1f4ddc;
        color: #fff;
        border-color: #163aa5;
      }
      .btn.danger {
        background: #fff;
        color: #e11d48;
        border-color: #ffcccc;
      }
      .btn.success {
        background: #10b981;
        color: #fff;
        border-color: #059669;
      }
      .btn.sm {
        padding: 5px 10px;
        font-size: 12px;
      }

      /* DB 목록 패널 */
      .db-list-panel {
        display: none;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 15px;
        max-height: 200px;
        overflow-y: auto;
      }
      .db-item {
        padding: 6px 10px;
        font-size: 13px;
        color: #334155;
        cursor: pointer;
        border-bottom: 1px solid #f1f5f9;
      }
      .db-item:hover {
        background: #e2e8f0;
        color: #1e3a8a;
        font-weight: 600;
      }
      .db-item:last-child {
        border-bottom: none;
      }

      /* 자동완성 리스트 */
      .autocomplete-wrapper {
        position: relative;
        margin-bottom: 15px;
      }
      .autocomplete-results {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        z-index: 100;
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 0 0 8px 8px;
        max-height: 200px;
        overflow-y: auto;
        display: none;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .autocomplete-item {
        padding: 10px 15px;
        font-size: 14px;
        cursor: pointer;
      }
      .autocomplete-item:hover,
      .autocomplete-item.selected {
        background: #eff6ff;
        color: #1f4ddc;
        font-weight: 600;
      }

      /* 학생 선택기 */
      .student-selector {
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px dashed #e5e7eb;
      }
      .student-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }
      .student-btn {
        padding: 8px 14px;
        border-radius: 20px;
        border: 1px solid #d1d5db;
        background: #fff;
        font-size: 13px;
        cursor: pointer;
        color: #4b5563;
      }
      .student-btn.active {
        background: #1f4ddc;
        color: #fff;
        border-color: #1f4ddc;
        font-weight: 600;
      }

      .control-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .status-text {
        font-size: 13px;
        color: #6b7280;
        font-weight: 600;
      }

      /* 최근 작업 이력 */
      .log-area {
        flex: 1;
        border: 1px solid #e5e7eb;
        background: #f9fafb;
        border-radius: 12px;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      .log-title {
        font-size: 14px;
        font-weight: 700;
        color: #4b5563;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .log-item {
        font-size: 13px;
        margin-bottom: 8px;
        padding-bottom: 8px;
        border-bottom: 1px solid #eee;
        color: #555;
      }
      .log-time {
        font-size: 11px;
        color: #9ca3af;
        margin-right: 5px;
      }
      .log-book {
        font-weight: 600;
        color: #1e3a8a;
      }

      /* 우측 기록창 */
      .right-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .right-title {
        font-weight: 700;
        font-size: 18px;
        color: #1f2937;
      }

      .student-record-block {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 15px;
        background: #fff;
        transition: 0.2s;
        position: relative;
      }
      .student-record-block:hover {
        border-color: #1f4ddc;
      }

      .record-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid #f3f4f6;
      }
      .record-student {
        font-weight: 700;
        color: #1f4ddc;
        font-size: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .record-byte {
        font-size: 13px;
        font-weight: 600;
        color: #6b7280;
      }

      .record-content {
        font-size: 14px;
        color: #374151;
        line-height: 1.6;
        word-break: break-all;
        white-space: pre-wrap;
      }
      .no-record {
        color: #9ca3af;
        font-style: italic;
      }

      /* 삭제 모드 개별 도서 태그 */
      .deletable-book {
        display: inline-block;
        background: #fee2e2;
        color: #b91c1c;
        padding: 4px 10px;
        border-radius: 6px;
        margin: 3px 4px 3px 0;
        cursor: pointer;
        border: 1px solid #fca5a5;
        font-size: 13px;
        font-weight: 600;
        transition: 0.2s;
      }
      .deletable-book:hover {
        background: #fca5a5;
        color: #fff;
      }

      #toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: #fff;
        padding: 10px 25px;
        border-radius: 30px;
        font-size: 13px;
        opacity: 0;
        transition: 0.3s;
        pointer-events: none;
        z-index: 2000;
      }
    </style>
  </head>
  <body>
    <div id="toast">알림</div>
    <div class="topbar">독서활동상황관리</div>

    <div class="container">
      <section class="left">
        <div class="input-card">
          <div class="card-header">
            <span class="card-title">📖 도서 기록 입력 (단일 모드)</span>
            <button class="btn sm" onclick="resetForm()">🔄 입력 초기화</button>
          </div>

          <div class="label-row">
            <span class="label">1. 도서 검색 (자동완성)</span>
            <button class="db-view-btn" onclick="toggleDBList()">
              📖 DB 목록 열기/닫기
            </button>
          </div>

          <div id="dbListPanel" class="db-list-panel"></div>

          <div class="autocomplete-wrapper">
            <input
              type="text"
              class="input"
              id="bookSearch"
              placeholder="책 제목을 입력하세요 (예: 코스모스)"
              autocomplete="off"
            />
            <div class="autocomplete-results" id="searchResults"></div>
          </div>

          <div style="display: flex; gap: 10px; margin-bottom: 15px">
            <div style="flex: 1">
              <div class="label">확정된 책 제목</div>
              <input
                type="text"
                class="input"
                id="finalTitle"
                placeholder="제목"
              />
            </div>
            <div style="flex: 1">
              <div class="label">저자 (수정 가능)</div>
              <input
                type="text"
                class="input"
                id="finalAuthor"
                placeholder="예: 김철수 외"
              />
            </div>
          </div>

          <div class="student-selector">
            <div class="control-row">
              <div class="label">2. 적용할 학생 선택</div>
              <div>
                <button class="btn sm" onclick="selectAllStudents(true)">
                  전체 선택
                </button>
                <button class="btn sm" onclick="selectAllStudents(false)">
                  해제
                </button>
              </div>
            </div>
            <div class="student-buttons" id="studentBtnContainer"></div>
            <div class="status-text" id="selectionStatus">선택된 학생: 0명</div>
          </div>

          <div style="margin-top: 25px; text-align: right">
            <button
              class="btn primary"
              onclick="applyToStudents()"
              style="width: 100%; padding: 12px"
            >
              💾 선택한 학생에게 일괄 적용
            </button>
          </div>
        </div>

        <div class="log-area">
          <div class="log-title">🕒 최근 적용 이력 (Session Log)</div>
          <div id="activityLog">
            <div
              style="
                color: #999;
                font-size: 13px;
                text-align: center;
                padding: 20px;
              "
            >
              아직 적용된 기록이 없습니다.
            </div>
          </div>
        </div>
      </section>

      <section class="right">
        <div class="right-header">
          <div class="right-title">학급 학생별 독서 기록 현황</div>
          <div style="display: flex; gap: 8px">
            <button
              class="btn danger"
              id="btnDeleteMode"
              onclick="toggleDeleteMode()"
            >
              기록 삭제 모드
            </button>
            <button class="btn success" onclick="copyAll()">
              💾 전체 복사 (NEIS)
            </button>
          </div>
        </div>
        <div id="recordContainer"></div>
      </section>
    </div>

      const MAX_BYTE = 1500;

      // [핵심 변경] 문자열(String)이 아닌 배열(Array)로 책을 관리하여 콤마 분리 오류 방지
      let studentRecords = new Map();
      STUDENT_LIST.forEach((s) => studentRecords.set(s.id, []));

      let isDeleteMode = false;
      let selectedIndex = -1;

      window.onload = () => {
        renderStudentButtons();
        renderRecords();
        initDBList();
      };

      function initDBList() {
        const panel = document.getElementById("dbListPanel");
        const sortedBooks = [...DUMMY_BOOKS].sort((a, b) =>
          a.title.localeCompare(b.title)
        );

        let html = "";
        sortedBooks.forEach((book) => {
          html += `<div class="db-item" onclick="selectBook('${book.title.replace(
            /'/g,
            "\\'"
          )}', '${book.author.replace(/'/g, "\\'")}')">📘 ${book.title} (${
            book.author
          })</div>`;
        });
        panel.innerHTML = html;
      }

      function toggleDBList() {
        const panel = document.getElementById("dbListPanel");
        if (panel.style.display === "block") {
          panel.style.display = "none";
        } else {
          panel.style.display = "block";
        }
      }

      const searchInput = document.getElementById("bookSearch");
      const resultsDiv = document.getElementById("searchResults");

      searchInput.addEventListener("input", (e) => {
        const val = e.target.value.trim().toLowerCase();
        resultsDiv.innerHTML = "";
        selectedIndex = -1;

        if (val.length < 1) {
          resultsDiv.style.display = "none";
          return;
        }

        const matched = DUMMY_BOOKS.filter((b) =>
          b.title.toLowerCase().includes(val)
        );
        if (matched.length === 0) {
          resultsDiv.style.display = "none";
          return;
        }

        matched.forEach((book) => {
          const div = document.createElement("div");
          div.className = "autocomplete-item";
          div.textContent = `${book.title} (${book.author})`;
          div.onclick = () => selectBook(book.title, book.author);
          resultsDiv.appendChild(div);
        });
        resultsDiv.style.display = "block";
      });

      searchInput.addEventListener("keydown", (e) => {
        const items = resultsDiv.querySelectorAll(".autocomplete-item");
        if (items.length === 0) return;

        if (e.key === "ArrowDown") {
          e.preventDefault();
          selectedIndex = (selectedIndex + 1) % items.length;
          updateSelection(items);
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          selectedIndex = (selectedIndex - 1 + items.length) % items.length;
          updateSelection(items);
        } else if (e.key === "Enter") {
          e.preventDefault();
          if (selectedIndex > -1) items[selectedIndex].click();
          else items[0].click();
        }
      });

      function updateSelection(items) {
        items.forEach((item, idx) => {
          if (idx === selectedIndex) {
            item.classList.add("selected");
            item.scrollIntoView({ block: "nearest" });
          } else {
            item.classList.remove("selected");
          }
        });
      }

      function selectBook(title, author) {
        document.getElementById("finalTitle").value = title;
        document.getElementById("finalAuthor").value = author;
        searchInput.value = title;
        resultsDiv.style.display = "none";
        document.getElementById("dbListPanel").style.display = "none";
      }

      function renderStudentButtons() {
        const container = document.getElementById("studentBtnContainer");
        container.innerHTML = "";
        STUDENT_LIST.forEach((s) => {
          const btn = document.createElement("button");
          btn.className = "student-btn";
          btn.textContent = s.name;
          btn.dataset.id = s.id;
          btn.onclick = () => {
            btn.classList.toggle("active");
            updateStatus();
          };
          container.appendChild(btn);
        });
      }

      function selectAllStudents(isSelect) {
        document.querySelectorAll(".student-btn").forEach((b) => {
          if (isSelect) b.classList.add("active");
          else b.classList.remove("active");
        });
        updateStatus();
      }

      function updateStatus() {
        const cnt = document.querySelectorAll(".student-btn.active").length;
        document.getElementById(
          "selectionStatus"
        ).innerText = `선택된 학생: ${cnt}명`;
      }

      function resetForm() {
        document.getElementById("bookSearch").value = "";
        document.getElementById("finalTitle").value = "";
        document.getElementById("finalAuthor").value = "";
        selectAllStudents(false);
        showToast("입력 폼이 초기화되었습니다.");
      }

      /* --- 배열 기반 부분 적용 로직 --- */
      function applyToStudents() {
        const title = document.getElementById("finalTitle").value.trim();
        const author = document.getElementById("finalAuthor").value.trim();
        const targets = document.querySelectorAll(".student-btn.active");

        if (!title || !author)
          return showToast("책 제목과 저자를 입력해주세요.");
        if (targets.length === 0)
          return showToast("학생을 최소 1명 선택해주세요.");

        // 특수기호를 제거하고 나이스 표준 '책이름(저자명)' 포맷팅
        const cleanTitle = title.replace(/[『』<>"']/g, "");
        const entry = `${cleanTitle}(${author})`;

        let appliedNames = [];
        let duplicateNames = [];

        targets.forEach((btn) => {
          const sid = btn.dataset.id;
          const sName = btn.textContent;
          let booksArr = studentRecords.get(sid);

          // 중복 검사
          if (!booksArr.includes(entry)) {
            booksArr.push(entry);
            studentRecords.set(sid, booksArr);
            appliedNames.push(sName);
          } else {
            duplicateNames.push(sName);
          }
        });

        renderRecords();

        if (duplicateNames.length > 0) {
          alert(
            `⚠️ [기재 중복 알림]\n\n선택하신 '${cleanTitle}' 도서가 이미 아래 학생들의 기록에 존재하여 중복 기재를 방지했습니다.\n\n▶ 중복 대상 학생: ${duplicateNames.join(
              ", "
            )}\n\n※ 위 학생들을 제외한 나머지 인원에게만 정상 반영되었습니다.`
          );
        }

        if (appliedNames.length > 0) {
          addLog(cleanTitle, appliedNames);
          showToast(`${appliedNames.length}명에게 성공적으로 적용되었습니다.`);
          selectAllStudents(false);
        } else {
          showToast("새로 추가된 기록이 없습니다.");
        }
      }

      function addLog(bookTitle, studentNames) {
        const logArea = document.getElementById("activityLog");
        if (logArea.innerHTML.includes("기록이 없습니다"))
          logArea.innerHTML = "";

        const time = new Date().toLocaleTimeString("ko-KR", {
          hour: "2-digit",
          minute: "2-digit",
        });
        const nameStr =
          studentNames.length > 2
            ? `${studentNames[0]} 외 ${studentNames.length - 1}명`
            : studentNames.join(", ");

        const div = document.createElement("div");
        div.className = "log-item";
        div.innerHTML = `<span class="log-time">${time}</span> <span class="log-book">${bookTitle}</span> → ${nameStr}`;
        logArea.prepend(div);
      }

      /* --- 배열 기반 부분 삭제 및 렌더링 로직 --- */
      function renderRecords() {
        const container = document.getElementById("recordContainer");
        container.innerHTML = "";

        STUDENT_LIST.forEach((s, idx) => {
          const wrap = document.createElement("div");
          wrap.className = "student-record-block";

          let booksArr = studentRecords.get(s.id);
          let text = booksArr.join(", ");
          const byte = getByteLength(text);

          let contentHtml = "";

          if (booksArr.length === 0) {
            contentHtml = '<span class="no-record">기록 없음</span>';
          } else {
            if (isDeleteMode) {
              // 삭제 모드일 때는 각 책을 삭제 가능한 개별 태그(span)로 렌더링
              booksArr.forEach((book, bIdx) => {
                contentHtml += `<span class="deletable-book" onclick="deleteBook('${s.id}', ${bIdx})">${book} <span style="margin-left:4px; font-size:10px;">❌</span></span>`;
              });
            } else {
              // 일반 모드일 때는 콤마로 연결된 문자열(나이스 규격)로 출력
              contentHtml = text;
            }
          }

          // 전체 삭제 버튼 (삭제 모드 & 책이 1권 이상일 때만 표시)
          let deleteAllBtn =
            isDeleteMode && booksArr.length > 0
              ? `<button class="btn sm danger" style="padding: 3px 8px; font-size: 11px;" onclick="deleteAllBooks('${s.id}')">전체 초기화</button>`
              : "";

          wrap.innerHTML = `
                  <div class="record-header">
                      <span class="record-student">${idx + 1}. ${
            s.name
          } ${deleteAllBtn}</span>
                      <span class="record-byte" style="color:${
                        byte > MAX_BYTE ? "red" : "#6b7280"
                      }">${byte} / ${MAX_BYTE} Byte</span>
                  </div>
                  <div class="record-content">${contentHtml}</div>
              `;

          container.appendChild(wrap);
        });
      }

      // 개별 책 삭제 기능
      window.deleteBook = function (studentId, bookIndex) {
        let booksArr = studentRecords.get(studentId);
        let bookName = booksArr[bookIndex];
        if (confirm(`[ ${bookName} ]\n도서를 목록에서 삭제하시겠습니까?`)) {
          booksArr.splice(bookIndex, 1);
          studentRecords.set(studentId, booksArr);
          renderRecords();
        }
      };

      // 학생 전체 책 삭제 기능
      window.deleteAllBooks = function (studentId) {
        let studentName = STUDENT_LIST.find((s) => s.id === studentId).name;
        if (
          confirm(
            `${studentName} 학생의 모든 독서 기록을 완전히 삭제하시겠습니까?`
          )
        ) {
          studentRecords.set(studentId, []);
          renderRecords();
        }
      };

      function toggleDeleteMode() {
        isDeleteMode = !isDeleteMode;
        const btn = document.getElementById("btnDeleteMode");
        if (isDeleteMode) {
          btn.textContent = "삭제 모드 종료 (완료)";
          btn.style.background = "#fee2e2";
          btn.style.color = "#b91c1c";
          showToast("삭제할 개별 도서를 클릭하세요.");
        } else {
          btn.textContent = "기록 삭제 모드";
          btn.style.background = "";
          btn.style.color = "";
          showToast("삭제 모드 해제");
        }
        renderRecords();
      }

      function copyAll() {
        if (isDeleteMode) return showToast("삭제 모드를 해제해주세요.");
        alert("작성된 내용을 NEIS에 입력합니다.");
      }

      function getByteLength(s) {
        let b = 0;
        for (let i = 0; i < s.length; i++) b += s.charCodeAt(i) >> 7 ? 3 : 1;
        return b;
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.style.opacity = 1;
        setTimeout(() => (t.style.opacity = 0), 2000);
      }
    </script>
  </body>
</html>
