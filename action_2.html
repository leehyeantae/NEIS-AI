  <head>

    <style>
      /* --- [공통 레이아웃 & GNB] --- */
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", -apple-system, sans-serif;
        background: #f5f6f8;
        color: #333;
        overflow: hidden;
      }
      .gnb-menu {
        background: #1f2937;
        display: flex;
        padding: 0 16px;
        overflow-x: auto;
      }
      .gnb-menu a {
        color: #9ca3af;
        text-decoration: none;
        padding: 12px 20px;
        font-size: 14px;
        font-weight: 700;
        transition: 0.2s;
        white-space: nowrap;
      }
      .gnb-menu a:hover {
        color: #fff;
        background: #374151;
      }
      .gnb-menu a.active {
        color: #fff;
        background: #1f4ddc;
      }

      .topbar {
        height: 48px;
        background: #f5c6cf;
        display: flex;
        align-items: center;
        padding: 0 16px;
        font-weight: 700;
        border-bottom: 1px solid #e5adba;
        color: #333;
        flex-shrink: 0;
      }

      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: calc(100vh - 48px - 43px);
      }
      .left,
      .right {
        padding: 25px;
        display: flex;
        flex-direction: column;
        background: #fff;
        overflow-y: auto;
        min-height: 0;
      }
      .left {
        border-right: 1px solid #e5e7eb;
        gap: 15px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 5px;
        flex-shrink: 0;
      }
      .section-title {
        font-size: 16px;
        font-weight: 700;
        color: #1f2937;
      }

      .input,
      .textarea,
      .select {
        width: 100%;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
        transition: 0.2s;
      }
      .textarea {
        resize: none;
        line-height: 1.6;
      }

      .btn {
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid #d1d5db;
        background: #fff;
        transition: 0.2s;
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .btn.primary {
        background: #1f4ddc;
        color: #fff;
        border-color: #163aa5;
      }
      .btn.success {
        background: #10b981;
        color: #fff;
        border-color: #059669;
      }
      .btn.danger {
        background: #fff;
        color: #e11d48;
        border-color: #ffcccc;
      }
      .btn.warning {
        background: #f59e0b;
        color: #fff;
        border-color: #d97706;
      }
      .btn.danger-btn {
        color: #ef4444;
        font-weight: bold;
        border: 1px solid #fecaca;
        background: #fff5f5;
      }
      .btn.sm {
        padding: 6px 12px;
        font-size: 12px;
      }

      /* --- [우측 마스터 패널] --- */
      .preview-box {
        flex: 6;
        min-height: 150px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 25px;
        font-size: 15px;
        line-height: 1.8;
        outline: none;
        background: #fff;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
        scroll-behavior: smooth;
      }
      .sentence-block {
        cursor: text;
        transition: background 0.4s ease-out;
        border-radius: 4px;
        padding: 2px 0;
      }
      .sentence-block:hover {
        background-color: #eff6ff;
      }
      .highlight-active {
        background-color: #fef08a !important;
      }

      .counter {
        text-align: right;
        margin-top: 10px;
        font-size: 13px;
        color: #6b7280;
        flex-shrink: 0;
      }
      .info-layer {
        flex: 4;
        min-height: 150px;
        border: 1px solid #e5e7eb;
        background: #fafafa;
        border-radius: 12px;
        padding: 15px;
        overflow-y: auto;
        margin-top: 15px;
      }

      .info-card {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 13px;
        border-left: 4px solid #1f4ddc;
        transition: 0.2s;
        position: relative;
        cursor: pointer;
        overflow: hidden;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      }
      .info-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        border-color: #cbd5e1;
      }
      .info-card.duplicate {
        border-left-color: #f59e0b;
        background: #fffbeb;
      }
      .info-card.deleted {
        border-left-color: #ef4444;
        opacity: 0.5;
        background: #fff5f5;
        pointer-events: none;
      }
      .info-card.optimized {
        border-left-color: #8b5cf6;
        background: #f5f3ff;
      }

      .accordion-header {
        padding: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 700;
        color: #333;
      }
      .accordion-chevron {
        transition: transform 0.3s ease;
        color: #9ca3af;
        font-size: 12px;
      }
      .info-card.expanded .accordion-chevron {
        transform: rotate(180deg);
      }
      .accordion-body-wrapper {
        display: grid;
        grid-template-rows: 0fr;
        transition: grid-template-rows 0.3s ease;
      }
      .info-card.expanded .accordion-body-wrapper {
        grid-template-rows: 1fr;
      }
      .accordion-body {
        overflow: hidden;
        padding: 0 12px;
      }
      .accordion-content {
        padding-bottom: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .tag {
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 11px;
        background: #f3f4f6;
        color: #4b5563;
        border: 1px solid #e5e7eb;
        display: inline-block;
        font-weight: bold;
      }
      .dup-badge {

        color: #fff;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 12px;
        font-weight: 700;
        margin-left: 8px;

      .status-badge {

      .delete-sentence-btn {

        border: 1px solid #fca5a5;
        border-radius: 6px;
        padding: 4px 10px;

        font-weight: bold;

        transition: 0.2s;
        align-self: flex-end;
      }
      .delete-sentence-btn:hover {

        color: #fff;

      .teacher-custom-box {

        padding: 10px;
        background: #fef9c3;
        color: #854d0e;
        border-left: 3px solid #eab308;

        line-height: 1.5;

      .modal {

        position: fixed;

        left: 0;

      .student-list {

        border-right: 1px solid #e5e7eb;
        padding: 15px 0;
        overflow-y: auto;

      .student-item {

      .keyword-chip.neg {

      }
      .keyword-chip.neg:hover {
        background: #fecaca;
      }
      .keyword-chip.neg.active {
        background: #ef4444;
        color: #fff;
        border-color: #ef4444;
      }

      .history-view {
        margin-top: 15px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 20px;
        flex: 1;
        overflow-y: auto;
      }
      .history-item {
        display: flex;

        border-radius: 8px;

        color: #fff;

        font-weight: 600;

        transition: 0.3s;
        pointer-events: none;
        z-index: 3000;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

    <script>
      function getSentences(text) {
        if (!text) return [];
        let matches = text.replace(/\n/g, " ").match(/[^.!?]+[.!?]*/g);
        return matches ? matches.map((s) => s.trim()).filter((s) => s) : [];
      }

      /* --- 맞춤법 엔진 --- */
      class GrammarEngine {
        constructor() {
          this.irregularDict = {
            든다: "듦",

      function updateKeywordTray(select) {
        const wrapper = select.closest(".input-wrapper");

      function loadKeywordsToTray(tray, category, rowElement) {
        tray.innerHTML = "";
        const keywords = KEYWORD_DB[category] || [];
        if (keywords.length === 0) {
          tray.innerHTML =
            "<span style='color:#999; font-size:12px;'>키워드가 없습니다. 직접 입력하세요.</span>";
          return;
        }

        const levelSelect = rowElement.querySelector(".level-select");
        const input = rowElement.querySelector(".case-input");

        keywords.forEach((kData) => {
          const chip = document.createElement("div");
          chip.className = "keyword-chip";
          if (kData.isNeg) chip.classList.add("neg");
          chip.textContent = kData.word;

          const updateActiveState = () => {
            const level = levelSelect.value;
            const sentence = level ? kData.s[level] || "" : "";
            if (sentence && input.value.includes(sentence))
              chip.classList.add("active");
            else chip.classList.remove("active");
          };
          updateActiveState();

          chip.onclick = () => {
            const level = levelSelect.value;
            if (!level) return alert("성취수준을 먼저 선택해주세요.");
            const sentence = kData.s[level] || "";
            if (!sentence) return;

            if (chip.classList.contains("active")) {
              input.value = input.value
                .replace(sentence, "")
                .replace(/\s{2,}/g, " ")
                .trim();
              chip.classList.remove("active");
            } else {
              input.value = (input.value + " " + sentence).trim();
              chip.classList.add("active");
            }
          };
          tray.appendChild(chip);
        });

        input.addEventListener("input", () => {
          const level = levelSelect.value;
          if (!level) return;
          tray.querySelectorAll(".keyword-chip").forEach((chip, idx) => {
            const sentence = keywords[idx].s[level] || "";
            if (sentence && input.value.includes(sentence))
              chip.classList.add("active");
            else chip.classList.remove("active");
          });
        });
      }

      function updateSentenceByLevel(selectElement) {
        const wrapper = selectElement.closest(".input-wrapper");
        const cat = wrapper.querySelector(".cat-select").value;
        const newLevel = selectElement.value;
        const input = wrapper.querySelector(".case-input");
        let currentText = input.value;

        if (!cat || !currentText) return;
        const keywords = KEYWORD_DB[cat] || [];

        keywords.forEach((kData) => {
          for (let oldLevel in kData.s) {
            if (
              oldLevel !== newLevel &&
              kData.s[oldLevel] &&
              currentText.includes(kData.s[oldLevel])
            ) {
              currentText = currentText.replace(
                kData.s[oldLevel],
                kData.s[newLevel] || ""
              );
            }
          }
        });

        input.value = currentText.replace(/\s{2,}/g, " ").trim();
        loadKeywordsToTray(
          wrapper.querySelector(".keyword-tray"),
          cat,
          wrapper.querySelector(".input-row")
        );
      }

          text = grammarEngine.convert(text);

          const isDup = db[currentStudent].logs.some(

          tempRecords.push({

        if (tempRecords.length > 0) {

      /* --- [V9.0 핵심] 자소서형 서사 조립 로직 (껍데기 안내문구 완전 제거) --- */
      function assembleContext(targets, comprehensive) {
        // 완벽한 Date 객체 기반 시계열 정렬
        targets.sort((a, b) => new Date(a.date) - new Date(b.date));

        let struggleTexts = {
          "성격/생활": new Set(),
          교우관계: new Set(),
          "학업/진로": new Set(),
          기타: new Set(),
        };
        let excelTexts = {
          "성격/생활": new Set(),
          교우관계: new Set(),
          "학업/진로": new Set(),
          기타: new Set(),
        };
        let catFreq = { "성격/생활": 0, 교우관계: 0, "학업/진로": 0, 기타: 0 };

        targets.forEach((l) => {
          let text = l.text.trim();
          text = text.replace(/\.{2,}/g, ".");
          if (!text.endsWith(".")) text += ".";

          let targetCat = "";
          if (["성격", "생활태도"].includes(l.cat)) targetCat = "성격/생활";
          else if (l.cat === "교우관계") targetCat = "교우관계";
          else if (["학업태도", "진로태도", "적성·활동"].includes(l.cat))
            targetCat = "학업/진로";
          else targetCat = "기타";

          if (["노력", "보통"].includes(l.level))
            struggleTexts[targetCat].add(text);
          else excelTexts[targetCat].add(text);
          catFreq[targetCat]++;
        });

        let paras = [];

        // V9.0: 자소서형 뼈대 (군더더기 없는 자연스러운 접속사만 배치)
        function getCatPrefix(isAlso) {
          return isAlso ? "또한, " : "";
        }

        for (let cat of ["성격/생활", "교우관계", "학업/진로", "기타"]) {
          let sArr = Array.from(struggleTexts[cat]);
          let eArr = Array.from(excelTexts[cat]);

          if (sArr.length > 0 || eArr.length > 0) {
            let para = getCatPrefix(paras.length > 0);

            if (sArr.length > 0 && eArr.length > 0) {
              // V9.0 성장 서사 콤팩트 브릿지
              let sJoined = sArr.join(" ");
              if (sJoined.endsWith(".")) sJoined = sJoined.slice(0, -1);
              para +=
                sJoined +
                ". 꾸준한 노력으로 긍정적인 변화를 보이며, " +
                eArr.join(" ");
            } else if (sArr.length > 0) {
              para += sArr.join(" ");
            } else if (eArr.length > 0) {
              para += eArr.join(" ");
            }
            paras.push(para);
          }
        }

        let resultText = paras.join(" ");
        if (comprehensive) {
          let comp = grammarEngine.convert(comprehensive.trim());
          resultText += (paras.length > 0 ? " " : "") + comp;
        }

        return {
          text: grammarEngine.convert(
            resultText.replace(/\s{2,}/g, " ").trim()
          ),
          freq: catFreq,
        };
      }

      function generateDraftAI() {
        const data = db[currentStudent];
        const targets = data.logs.filter((l) => l.checked);
        if (targets.length === 0 && !data.comprehensive)
          return alert(
            "생성할 데이터가 없습니다. 모달에서 기록을 작성하고 체크해주세요."
          );

        const { text: resultText, freq: catFreq } = assembleContext(
          targets,
          data.comprehensive
        );
        document.getElementById("tempDraft").value = resultText;

        tempContext = {
          hashKey:
            "BHV|" +
            targets.map((t) => t.id).join(",") +
            "|" +
            (data.comprehensive ? "COMP" : ""),
          logIds: targets.map((t) => t.id),
          freq: catFreq,
          comp: data.comprehensive,
          aiGeneratedText: resultText,
        };

        showToast("자소서형 행특 초안이 시계열 기반으로 자동 조립되었습니다.");
      }

      function moveToFinal() {
        const aiDraftText = document.getElementById("tempDraft").value;
        const teacherDraftText = document
          .getElementById("teacherDraft")
          .value.trim();
        const preview = document.getElementById("finalPreview");

        if (!aiDraftText || !tempContext)
          return alert("생성된 AI 초안이 없습니다.");

        let correctedAIText = grammarEngine.convert(aiDraftText);
        let correctedTeacherText = teacherDraftText
          ? grammarEngine.convert(teacherDraftText)
          : "";

        let finalCombinedText = correctedAIText;
        if (correctedTeacherText)
          finalCombinedText += " " + correctedTeacherText;
        finalCombinedText = finalCombinedText.replace(/\s{2,}/g, " ");

        let b = 0;
        let testText = preview.innerText + " " + finalCombinedText;
        for (let i = 0; i < testText.length; i++)
          b += testText.charCodeAt(i) > 127 ? 3 : 1;
        if (b > 1500)
          return alert(
            "⚠️ 생기부 최대 용량(1500 Byte)을 초과하여 전송할 수 없습니다."
          );

        if (preview.innerText.includes("학생을 선택하고"))
          preview.innerText = "";
        if (preview.innerText.trim() !== "")
          preview.appendChild(document.createTextNode(" "));

        const uniqueId = "block_" + Date.now();
        const span = document.createElement("span");
        span.className = "sentence-block";
        span.id = uniqueId;
        span.innerText = finalCombinedText;
        preview.appendChild(span);

        finalHistoryStack.push({
          id: uniqueId,
          hashKey: tempContext.hashKey,
          logIds: tempContext.logIds,
          freq: tempContext.freq,
          comp: tempContext.comp,
          aiGeneratedText: correctedAIText,
          teacherText: correctedTeacherText,
          len: finalCombinedText.length,
          status: "active",
          needsUpgrade: false,
          manualCount: correctedTeacherText ? 1 : 0,
        });

        document.getElementById("tempDraft").value = "";
        document.getElementById("teacherDraft").value = "";
        tempContext = null;

        updateDuplicateStatus();
        renderInfoLayer();
        updateByte();
      }

      function updateDuplicateStatus() {
        let catCounts = {
          "성격/생활": 0,
          교우관계: 0,
          "학업/진로": 0,
          기타: 0,
        };
        finalHistoryStack.forEach((item) => {
          if (item.status !== "deleted") {
            for (let cat in item.freq) {
              if (item.freq[cat] > 0) catCounts[cat]++;
            }
          }
        });
        finalHistoryStack.forEach((item) => {
          if (item.status !== "deleted") {
            item.needsUpgrade = Object.keys(item.freq).some(
              (cat) => item.freq[cat] > 0 && catCounts[cat] > 1
            );
          }
        });
      }

      function renderInfoLayer() {
        const con = document.getElementById("infoContentContainer");
        con.innerHTML = "";
        if (finalHistoryStack.length === 0) {
          con.innerHTML = "생성 이력이 없습니다.";
          return;
        }

        finalHistoryStack.forEach((item, index) => {
          const div = document.createElement("div");
          div.className = `info-card ${item.status} ${
            item.needsUpgrade ? "duplicate" : ""
          }`;

          div.onclick = () => {
            div.classList.toggle("expanded");
            highlightSentence(item.id);
          };

          let tagsHtml = "";
          for (const [cat, count] of Object.entries(item.freq)) {
            if (count > 0)
              tagsHtml += `<span class="tag">${cat} <b style="color:#1f4ddc;">${count}건</b></span>`;
          }
          if (item.comp) tagsHtml += `<span class="tag">종합의견 포함</span>`;

          let delBtn = `<button class="delete-sentence-btn" onclick="deleteFinalSentence(event, '${item.id}')">🗑️ 삭제</button>`;
          let dupAlert = item.needsUpgrade
            ? `<span class="dup-badge">⚠️ 카테고리 누적 (다듬기 요망)</span>`
            : "";

          let statBadge = "";
          if (item.status === "deleted")
            statBadge =
              "<span class='status-badge' style='background:#ef4444;'>❌ 삭제됨</span>";
          else if (item.status === "optimized")
            statBadge =
              "<span class='status-badge' style='background:#8b5cf6;'>🪄 통합 및 압축됨</span>";

          let teacherBoxHtml = "";
          if (item.teacherText) {
            teacherBoxHtml = `<div class="teacher-custom-box"><b>[✏️ 교사 개별화 서사 직접 작성]</b><br/>${item.teacherText}</div>`;
          }

          div.innerHTML = `
            <div class="accordion-header">
                <span style="display:flex; align-items:center; gap:5px;">👤 융합 문단 #${
                  index + 1
                } ${dupAlert}</span>
                <span class="accordion-chevron">▼</span>
            </div>
            <div class="accordion-body-wrapper">
                <div class="accordion-body">
                    <div class="accordion-content">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>${statBadge}</div>
                            ${delBtn}
                        </div>
                        <div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:4px;">${tagsHtml}</div>
                        ${teacherBoxHtml}
                    </div>
                </div>
            </div>
          `;
          con.appendChild(div);
        });
      }

      function highlightSentence(id) {
        document
          .querySelectorAll(".sentence-block")
          .forEach((el) => el.classList.remove("highlight-active"));
        const target = document.getElementById(id);
        if (target) {
          target.scrollIntoView({ behavior: "smooth", block: "center" });
          target.classList.add("highlight-active");
          setTimeout(() => {
            target.classList.remove("highlight-active");
          }, 2000);
        }
      }

      function deleteFinalSentence(event, id) {
        event.stopPropagation();
        const target = document.getElementById(id);
        if (target) {
          if (target.previousSibling && target.previousSibling.nodeType === 3)
            target.previousSibling.remove();
          target.remove();
        }
        finalHistoryStack = finalHistoryStack.filter((item) => item.id !== id);
        updateDuplicateStatus();
        renderInfoLayer();
        updateByte();
        showToast("문단이 삭제되었습니다.");
      }

      /* --- [V9.0 추가] 되돌리기 백업 및 복구 로직 --- */
      function saveUndoState() {
        undoStack.push({
          history: JSON.parse(JSON.stringify(finalHistoryStack)),
          html: document.getElementById("finalPreview").innerHTML,
        });
        document.getElementById("undoBtn").style.display = "inline-flex";
      }

      function undoFinal() {
        if (undoStack.length === 0)
          return alert("되돌릴 이전 상태가 없습니다.");
        if (!confirm("압축 전(이전 상태)으로 되돌리시겠습니까?")) return;

        let prevState = undoStack.pop();
        finalHistoryStack = prevState.history;
        document.getElementById("finalPreview").innerHTML = prevState.html;

        if (undoStack.length === 0)
          document.getElementById("undoBtn").style.display = "none";

        renderInfoLayer();
        updateByte();
        showToast("이전 상태로 완벽하게 복구되었습니다.");
      }

      /* --- [V9.0] 안전 압축(Safe Trim) - 평가어 보호 --- */
      function safeCompress(text) {
        let c = text;
        // 불필요한 기계적 템플릿과 껍데기 부사 제거 (평가어 보존)
        c = c.replace(/종합적으로 볼 때, /g, "");
        c = c.replace(/더불어 /g, "");
        return c;
      }

      /* --- [V9.0 핵심] 시계열 재배열 및 수동 텍스트 100% 보존 융합 엔진 --- */
      function checkAndUpgradeIntegrity() {
        let activeItems = finalHistoryStack.filter(
          (i) => i.status !== "deleted"
        );
        if (activeItems.length === 0) return alert("다듬을 내용이 없습니다.");

        if (
          !confirm(
            "⚠️ [주의]\nAI 다듬기 실행 시 선생님이 별도로 추가하신 내용은 100% 보존되며, 여러 문단이 [완벽한 날짜 순서]와 [압축된 자소서형 서사]로 하나로 재조립됩니다.\n진행하시겠습니까?"
          )
        )
          return;

        // [V9.0 추가] 실행 직전 백업
        saveUndoState();

        let allActiveLogIds = [];
        let compToUse = "";
        let allTeacherTexts = [];

        // 화면 텍스트가 아닌, 저장된 캡슐(메타데이터)에서 교사 텍스트 추출 보존
        activeItems.forEach((item) => {
          if (item.logIds) allActiveLogIds.push(...item.logIds);
          if (item.comp) compToUse = item.comp;
          if (item.teacherText) allTeacherTexts.push(item.teacherText);
        });

        allActiveLogIds = [...new Set(allActiveLogIds)];

        // Date 기반 완벽 시계열 정렬
        let allTargets = db[currentStudent].logs.filter((l) =>
          allActiveLogIds.includes(l.id)
        );
        allTargets.sort((a, b) => new Date(a.date) - new Date(b.date));

        // 재조립 (껍데기 제거된 자소서형 서사)
        const { text: rawUpgradedText, freq: mergedFreq } = assembleContext(
          allTargets,
          compToUse
        );

        // 안전 압축 적용 (불필요한 부사 제거)
        let upgradedText = safeCompress(rawUpgradedText);

        // 교사 직접 작성 내용 병합 (항상 맨 마지막에 묵묵히 배치)
        let finalCombinedText = upgradedText;
        let mergedTeacherText = allTeacherTexts.join(" ").trim();
        if (mergedTeacherText) {
          finalCombinedText += " " + mergedTeacherText;
        }

        finalCombinedText = finalCombinedText.replace(/\s{2,}/g, " ");
        let finalText = grammarEngine.convert(finalCombinedText);

        let b = 0;
        for (let i = 0; i < finalText.length; i++)
          b += finalText.charCodeAt(i) > 127 ? 3 : 1;
        if (b > 1500)
          alert(
            "⚠️ [경고] 최적화된 문장의 용량이 1500 Byte를 초과했습니다. 기재 내용을 줄여주세요."
          );

        const preview = document.getElementById("finalPreview");
        preview.innerHTML = "";
        const uniqueId = "opt_" + Date.now();
        const span = document.createElement("span");
        span.className = "sentence-block";
        span.id = uniqueId;
        span.innerText = finalText;
        preview.appendChild(span);

        finalHistoryStack = [
          {
            id: uniqueId,
            hashKey: "BHV_MERGED_" + Date.now(),
            logIds: allActiveLogIds,
            freq: mergedFreq,
            comp: compToUse,
            aiGeneratedText: upgradedText,
            teacherText: mergedTeacherText, // 100% 보존됨
            len: finalText.length,
            status: "optimized",
            needsUpgrade: false,
            manualCount: mergedTeacherText ? 1 : 0,
          },
        ];

        renderInfoLayer();
        updateByte();
        showToast(
          "안전 압축 및 날짜 기반 통합 정렬이 성공적으로 완료되었습니다!"
        );
      }

      function clearFinal() {
        if (confirm("전체 삭제하시겠습니까?")) {
          document.getElementById("finalPreview").innerText = "";
          finalHistoryStack = [];
          undoStack = [];
          document.getElementById("undoBtn").style.display = "none";
          renderInfoLayer();
          updateByte();
        }
      }

      function updateByte() {
        const text = document.getElementById("finalPreview").innerText;
        document.getElementById("charNum").innerText = text.length;
        let bytes = 0;
        for (let i = 0; i < text.length; i++)
          bytes += text.charCodeAt(i) > 127 ? 3 : 1;
        document.getElementById("byteNum").innerText = bytes;
        document.getElementById("byteNum").style.color =
          bytes > 1500 ? "red" : "#1f4ddc";
      }

      function finalApply() {
        alert("NEIS 입력 완료");
      }
    </script>
  </body>
</html>
